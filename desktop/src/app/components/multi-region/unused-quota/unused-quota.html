<div class="unused-quota-page">
    <div class="page-header">
        <h2>Unused Quota</h2>
        <button mat-raised-button color="primary" (click)="detect()">
            <i class="fa fa-search"></i> Detect Unused Quota
        </button>
    </div>

    <bl-table [data]="unusedAccounts" *ngIf="unusedAccounts.length > 0">
        <bl-column name="accountName">
            <div *blHeadCellDef>Account Name</div>
            <div *blCellDef="let info">{{info.accountName}}</div>
        </bl-column>

        <bl-column name="region">
            <div *blHeadCellDef>Region</div>
            <div *blCellDef="let info">{{info.region}}</div>
        </bl-column>

        <bl-column name="lowPriorityCoresFree">
            <div *blHeadCellDef>LP Cores Free</div>
            <div *blCellDef="let info">{{info.lowPriorityCoresFree}}</div>
        </bl-column>

        <bl-column name="dedicatedCoresFree">
            <div *blHeadCellDef>Dedicated Cores Free</div>
            <div *blCellDef="let info">{{info.dedicatedCoresFree}}</div>
        </bl-column>

        <bl-column name="poolsFree">
            <div *blHeadCellDef>Pool Slots Free</div>
            <div *blCellDef="let info">{{info.poolsFree}}</div>
        </bl-column>
    </bl-table>

    <bl-no-item
        [itemCount]="unusedAccounts.length"
        *ngIf="unusedAccounts.length === 0"
    >
        <i icon class="fa fa-exclamation-triangle" aria-hidden="true"></i>
        <span no-filter
            >No unused quota detected. Click Detect Unused Quota to scan all
            accounts.</span
        >
    </bl-no-item>
</div>
